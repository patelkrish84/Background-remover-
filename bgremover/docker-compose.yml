services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_TARGET: http://backend:5000
    depends_on:
      - backend
    env_file:
      - ./frontend/.env

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-adminsdk.json
      REMBG_PYTHON: python
      REMBG_MODEL: u2netp
      REMBG_MAX_EDGE: 1024
      BACKGROUND_REMOVAL_PROVIDER: auto
      U2NET_HOME: /app/.u2net
    ports:
      - "5000:5000"
    volumes:
      - ./backend/bakgroundremovel-firebase-adminsdk-fbsvc-1890f95449.json:/run/secrets/firebase-adminsdk.json:ro
      - ./backend/.u2net:/app/.u2net
